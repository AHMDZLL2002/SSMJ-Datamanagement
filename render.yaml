services:
- type: web
  name: SSMJ-Datamanagement
  env: node
  plan: starter
  buildCommand: npm install
  startCommand: npm start
  envVars:
  - key: NODE_ENV
    value: production
  - key: DB_PATH
    value: /var/data/app.db
  - key: SESSION_SECRET
    generateValue: true
  disk:
    name: appdata
    mountPath: /var/data
    sizeGB: 1
